<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ancient Sands Test</title>
    <style>
       body { margin: 0; overflow: hidden; background: #000000; }
		canvas { display: block; }

		/* --- THE ANCIENT SANDS INTRO OVERLAY --- */
		#intro-overlay {
			position: fixed;
			top: 0; left: 0; width: 100%; height: 100%;
			background: black;
			display: flex; justify-content: center; align-items: center;
			z-index: 9999; 
			transition: opacity 2.5s ease;
			}
		
		.logo-container {
			position: relative;
			opacity: 0;
			transition: opacity 2s ease;
			
			/* The mask does all the heavy lifting now */
			-webkit-mask-image: url('./media/theancientsands.png');
			mask-image: url('./media/theancientsands.png');
			-webkit-mask-size: contain;
			mask-repeat: no-repeat;
			mask-position: center;
		}

		.logo-container img {
			display: block;
			max-width: 80vw;
			visibility: visible; /* Ensure it's not hidden */
		}

		.shine {
			position: absolute;
			top: 0; 
			left: -150%;
			width: 100%; /* Wider shine for better coverage */
			height: 100%;
			background: linear-gradient(
				to right, 
				rgba(255,255,255,0) 0%, 
				rgba(255,255,255,0.9) 50%, 
				rgba(255,255,255,0) 100%
			);
			transform: skewX(-25deg);
			pointer-events: none;
		}

		.fade-in { opacity: 1 !important; }
		.run-shine { animation: shine-anim 3.0s ease-in-out forwards; }

		@keyframes shine-anim {
			0% { left: -150%; }
			100% { left: 150%; }
		}
    </style>
</head>

<body>

	<div id="intro-overlay">
        <div class="logo-container">
            <img src="./media/theancientsands.png" id="game-logo" alt="The Ancient Sands Logo" style="max-width: 80vw;">
            <div class="shine"></div>
        </div>
    </div>
	
    <script type="importmap">
	{
	  "imports": {
		"three": "./three/build/three.module.js",
		"three/addons/": "./three/examples/jsm/"
	  }
	}
	</script>
	
	<script type="module" src="main.js"></script>
</body>
</html>
